<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bajo el mismo cielo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia,serif;
}

body{
height:100vh;
min-height:100vh;
overflow-x:hidden;

background:black;
color:white;

display:flex;
justify-content:center;
align-items:center;

padding:20px;
}

/* ESPACIO */

.space{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow:hidden;
}

@keyframes cameraMove{
0%{transform:translate(-10%,-10%) scale(1);}
50%{transform:translate(-20%,-15%) scale(1.1);}
100%{transform:translate(-10%,-10%) scale(1);}
}

/* GALAXIA */

.galaxy{

position:absolute;
width:150%;
height:150%;
top:-25%;
left:-25%;

background:
radial-gradient(circle at 40% 60%, rgba(200,200,255,.25), transparent 40%),
radial-gradient(circle at 60% 40%, rgba(150,120,255,.2), transparent 45%);

filter:blur(70px);

animation:galaxyRotate 200s linear infinite;

}

/* ESTRELLAS */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2}
to{opacity:1}
}

/* ESTRELLAS FUGACES */

.shooting-star{
position:absolute;
width:3px;
height:3px;
background:white;
box-shadow:0 0 10px white;
border-radius:50%;
animation:shoot 3s linear forwards;
}

@keyframes shoot{
0%{transform:translate(0,0);opacity:1;}
100%{transform:translate(-900px,900px);opacity:0;}
}

/* PLANETAS */

.planet{
position:absolute;
animation:float 20s ease-in-out infinite alternate;
}

.planet img{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(40px)}
}

/* SATURNO */

.saturn{
width:clamp(70px,18vw,140px);
height:clamp(70px,18vw,140px);
top:6%;
right:4%;
}

.ring{
position:absolute;
width:200px;
height:70px;
border-radius:50%;
border:5px solid rgba(220,200,170,.6);
top:35px;
left:-35px;
transform:rotate(20deg);
}

/* LUNA */

.moon{
width:clamp(45px,12vw,90px);
height:clamp(45px,12vw,90px);
top:14%;
left:4%;
}

/* PLUTON */

.pluto{
width:clamp(25px,7vw,50px);
height:clamp(25px,7vw,50px);
bottom:12%;
right:10%;
}

/* TIERRA */

.earth{
width:clamp(60px,15vw,120px);
height:clamp(60px,15vw,120px);
bottom:8%;
left:10%;
opacity:0;
animation:earthAppear 8s forwards 10s;
}

@keyframes earthAppear{
from{opacity:0; transform:scale(.5)}
to{opacity:1; transform:scale(1)}
}

/* CONTENEDOR */

.container{

position:relative;

width:90%;
max-width:500px;

margin:auto;

padding:40px 25px;

border-radius:20px;

background:rgba(0,0,0,0.65);
backdrop-filter:blur(10px);

box-shadow:0 0 40px rgba(0,0,0,0.9);

text-align:center;

z-index:10;

}

h1{
font-size:clamp(20px,6vw,28px);
letter-spacing:3px;
margin-bottom:20px;
color:#ffb6c1;
}

.texto{
font-size:clamp(15px,4vw,20px);
line-height:1.7;
white-space:pre-line;
min-height:280px;
}

.cursor{
display:inline-block;
width:3px;
background:white;
margin-left:3px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

.linea{
width:200px;
height:2px;
background:#ffb6c1;
margin:30px auto;
}

.fechas span{
display:block;
font-size:clamp(16px,4vw,22px);
margin:6px 0;
}

.contador{
margin-top:10px;
font-size:clamp(14px,3.5vw,20px);
color:#ffdede;
}

/* AJUSTE MOVIL */

@media (max-width:600px){

.saturn{
top:5%;
right:5%;
}

.moon{
top:10%;
left:5%;
}

.pluto{
bottom:15%;
right:15%;
}

.earth{
bottom:10%;
left:15%;
}

}

</style>

</head>

<body>

<div class="space">
<div class="galaxy"></div>

<div class="planet saturn">
<img src="https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg">
<div class="ring"></div>
</div>

<div class="planet moon">
<img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg">
</div>

<div class="planet pluto">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Nh-pluto-in-true-color_2x_JPEG-edit-frame.jpg">
</div>

<div class="planet earth">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">
</div>

</div>

<div class="container">

<h1>Un último adiós</h1>

<div class="texto">
<span id="texto"></span><span class="cursor"></span>
</div>

<div class="linea"></div>

<div class="fechas">
<span>07 de Junio del 2025</span>
<span>al</span>
<span>09 de Marzo del 2026</span>
</div>

<div class="contador" id="contador"></div>

</div>

<audio id="musica" loop>
<source src="saturno.mp3" type="audio/mpeg">
</audio>

<script>

/* MUSICA */

const audio=document.getElementById("musica");

document.addEventListener("click",function(){
audio.play();
},{once:true});

/* TEXTO */

const mensaje=`Hola mi amor, será la ultima vez que te llamo así porque hoy te digo adiós
Todo fue color de Rosa, fue hermoso en mi corazón, pero no todo es bello
Y el blanco se tornó color marrón, y veo gris
Ya no te reconozco a ti, eres tan fría y cortante 
Ya no sé qué decir, ¿Si insistir?
O tal vez ya dejarte ir, es una guerra entre mi mente y mi corazón a morir
Te quiero cerca, pero a la vez te quiero lejos
Te amo tanto, pero a la vez odio tus complejos
Ya no reconozco tu silueta en aquel espejo
Eres tan bella que haces que yo me sienta perplejo y me sienta viejo
Un amargado de la vida, pero bueno, voy a terminar esto sin ser suicida
Adiós fuiste lo mejor que me paso
Y si te fallé, ahora te pido perdón`;

let i=0;

function escribir(){

if(i<mensaje.length){

document.getElementById("texto").innerHTML+=mensaje.charAt(i);

i++;

setTimeout(escribir,40);

}else{

lluviaEstrellas();

}

}

escribir();

/* ESTRELLAS */

for(let i=0;i<200;i++){

let star=document.createElement("div");
star.className="star";

star.style.top=Math.random()*100+"%";
star.style.left=Math.random()*100+"%";

document.body.appendChild(star);

}

/* ESTRELLAS FUGACES */

function shootingStar(){

let star=document.createElement("div");

star.className="shooting-star";

star.style.top=Math.random()*40+"%";
star.style.left=(Math.random()*100+50)+"%";

document.body.appendChild(star);

setTimeout(()=>{star.remove()},3000);

}

setInterval(shootingStar,5000);

/* LLUVIA FINAL */

function lluviaEstrellas(){

for(let i=0;i<20;i++){

setTimeout(shootingStar,i*200);

}

}

/* CONTADOR */

const inicio=new Date("2025-06-07");
const fin=new Date("2026-03-09");

let diff=fin-inicio;

let dias=Math.floor(diff/(1000*60*60*24));
let meses=Math.floor(dias/30);
let años=Math.floor(meses/12);

meses%=12;
dias%=30;

document.getElementById("contador").innerHTML=
"Duración de nuestra historia: "+años+" años, "+meses+" meses y "+dias+" días";

</script>

</body>
</html>
